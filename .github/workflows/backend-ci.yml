name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  service-tests:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - ai-service
          - content-service
          - activity-service
          - subscription-service
          - plan-service
          - progress-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp -pl ${{ matrix.service }} test

  aggregate-build:
    name: Aggregate compile check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: service-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile all services
        run: mvn -B -ntp -DskipTests compile

  build-and-push-images:
    name: Build and push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - service-tests
      - aggregate-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - ai-service
          - content-service
          - activity-service
          - subscription-service
          - plan-service
          - progress-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/zacle/tranquilai-${{ matrix.service }}:${{ github.sha }}
