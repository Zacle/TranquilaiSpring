name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  service-tests:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - ai-service
          - content-service
          - activity-service
          - subscription-service
          - plan-service
          - progress-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp -pl ${{ matrix.service }} test

  aggregate-build:
    name: Aggregate compile check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: service-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile all services
        run: mvn -B -ntp -DskipTests compile

  build-and-push-images:
    name: Build and push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - service-tests
      - aggregate-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - ai-service
          - content-service
          - activity-service
          - subscription-service
          - plan-service
          - progress-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/zacle/tranquilai-${{ matrix.service }}:${{ github.sha }}

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-and-push-images
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN || secrets.DIGITALOCEAN_TOKEN }}

      - name: Install SOPS
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64
          chmod +x /usr/local/bin/sops
          sops --version

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          doctl kubernetes cluster kubeconfig save tranquilai-doks --expiry-seconds 600
          kubectl cluster-info

      - name: Configure SOPS age key
        shell: bash
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "SOPS_AGE_KEY GitHub secret is required for staging deploys." >&2
            exit 1
          fi
          {
            echo "SOPS_AGE_KEY<<EOF"
            echo "$SOPS_AGE_KEY"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create or update GHCR pull secret
        shell: bash
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          kubectl create namespace tranquilai-staging --dry-run=client -o yaml | kubectl apply -f -
          if [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_TOKEN is not set; skipping ghcr-pull-secret creation."
            echo "This is fine only if your GHCR images are public or the secret already exists."
            exit 0
          fi
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace tranquilai-staging \
            --docker-server=ghcr.io \
            --docker-username=zacle \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm release to staging
        shell: pwsh
        run: ./infra/scripts/deploy-staging.ps1 -ImageTag "${{ github.sha }}"

      - name: Smoke test staging
        shell: pwsh
        run: ./infra/scripts/smoke-test.ps1 -BaseUrl "https://api-staging.tranquilai.cloud" -TimeoutSeconds 120

  deploy-prod:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-staging
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN || secrets.DIGITALOCEAN_TOKEN }}

      - name: Install SOPS
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64
          chmod +x /usr/local/bin/sops
          sops --version

      - name: Configure kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          doctl kubernetes cluster kubeconfig save tranquilai-doks --expiry-seconds 600
          kubectl cluster-info

      - name: Configure SOPS age key
        shell: bash
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SOPS_AGE_KEY" ]; then
            echo "SOPS_AGE_KEY GitHub secret is required for production deploys." >&2
            exit 1
          fi
          {
            echo "SOPS_AGE_KEY<<EOF"
            echo "$SOPS_AGE_KEY"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create or update GHCR pull secret
        shell: bash
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          kubectl create namespace tranquilai-prod --dry-run=client -o yaml | kubectl apply -f -
          if [ -z "$GHCR_PULL_TOKEN" ]; then
            echo "GHCR_PULL_TOKEN is not set; skipping ghcr-pull-secret creation."
            echo "This is fine only if your GHCR images are public or the secret already exists."
            exit 0
          fi
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace tranquilai-prod \
            --docker-server=ghcr.io \
            --docker-username=zacle \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Helm release to production
        shell: pwsh
        run: ./infra/scripts/deploy-prod.ps1 -ImageTag "${{ github.sha }}"

      - name: Smoke test production
        shell: pwsh
        run: ./infra/scripts/smoke-test.ps1 -BaseUrl "https://api.tranquilai.cloud" -TimeoutSeconds 120
