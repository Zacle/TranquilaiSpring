server:
  port: ${SERVER_PORT:8085}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: activity-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tranquilai_activity}
    username: ${SPRING_DATASOURCE_USERNAME:tranquilai}
    password: ${SPRING_DATASOURCE_PASSWORD:tranquilai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:tranquilai}
    password: ${SPRING_RABBITMQ_PASSWORD:tranquilai_secret}

app:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8083}
  progress-service-url: ${PROGRESS_SERVICE_URL:http://localhost:8087}
  plan-service-url: ${PLAN_SERVICE_URL:http://localhost:8086}
  subscription-service-url: ${SUBSCRIPTION_SERVICE_URL:http://localhost:8089}
  internal-service-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tranquilai: DEBUG
