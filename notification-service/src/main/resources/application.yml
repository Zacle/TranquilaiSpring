server:
  port: ${SERVER_PORT:8088}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tranquilai_notifications}
    username: ${SPRING_DATASOURCE_USERNAME:tranquilai}
    password: ${SPRING_DATASOURCE_PASSWORD:tranquilai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:internal-secret-change-in-prod}
  # Base64-encoded Firebase service account JSON, or leave blank to use GOOGLE_APPLICATION_CREDENTIALS
  firebase-service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

logging:
  level:
    com.tranquilai: DEBUG
