server:
  port: 8083

spring:
  application:
    name: ai-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/tranquilai_ai}
      auto-index-creation: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:tranquilai}
    password: ${SPRING_RABBITMQ_PASSWORD:tranquilai_secret}
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      chat:
        completions-path: /v1beta/openai/chat/completions
        options:
          model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
          temperature: ${GEMINI_CHAT_TEMPERATURE:0.45}
          max-tokens: ${GEMINI_CHAT_MAX_TOKENS:1000}
          top-p: ${GEMINI_CHAT_TOP_P:0.85}

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}
  plan-service-url: ${PLAN_SERVICE_URL:http://localhost:8086}
  progress-service-url: ${PROGRESS_SERVICE_URL:http://localhost:8087}
  subscription-service-url: ${SUBSCRIPTION_SERVICE_URL:http://localhost:8089}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tranquilai: DEBUG
    org.springframework.ai: INFO
