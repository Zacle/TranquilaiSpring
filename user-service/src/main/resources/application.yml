server:
  port: ${SERVER_PORT:8082}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: user-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tranquilai_users}
    username: ${SPRING_DATASOURCE_USERNAME:tranquilai}
    password: ${SPRING_DATASOURCE_PASSWORD:tranquilai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}

  servlet:
    multipart:
      max-file-size: ${PROFILE_PICTURE_MAX_FILE_SIZE:5MB}
      max-request-size: ${PROFILE_PICTURE_MAX_REQUEST_SIZE:6MB}

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:internal-secret-change-in-prod}
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
  profile-pictures:
    firebase-storage-bucket: ${FIREBASE_STORAGE_BUCKET:}
    firebase-service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
    max-size-bytes: ${PROFILE_PICTURE_MAX_SIZE_BYTES:5242880}
  events:
    auth-exchange: ${AUTH_EVENTS_EXCHANGE:tranquilai.auth.events}
    user-verified-queue: ${USER_VERIFIED_QUEUE:user.auth-user-verified}
    user-verified-routing-key: ${AUTH_USER_VERIFIED_ROUTING_KEY:auth.user.verified}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tranquilai: DEBUG
