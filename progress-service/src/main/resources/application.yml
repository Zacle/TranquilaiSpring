server:
  port: ${SERVER_PORT:8087}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: progress-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tranquilai_progress}
    username: ${SPRING_DATASOURCE_USERNAME:tranquilai}
    password: ${SPRING_DATASOURCE_PASSWORD:tranquilai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:dev-internal-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tranquilai: DEBUG
