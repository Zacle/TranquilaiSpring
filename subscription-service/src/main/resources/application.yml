server:
  port: ${SERVER_PORT:8089}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: subscription-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tranquilai_subscriptions}
    username: ${SPRING_DATASOURCE_USERNAME:tranquilai}
    password: ${SPRING_DATASOURCE_PASSWORD:tranquilai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:tranquilai_secret}
      ssl:
        enabled: ${SPRING_REDIS_SSL_ENABLED:${SPRING_DATA_REDIS_SSL_ENABLED:false}}
      timeout: 2000ms

google-play:
  service-account-json: ${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:}
  package-name: ${GOOGLE_PLAY_PACKAGE_NAME:com.tranquilai.app}

app:
  internal-service-key: ${INTERNAL_SERVICE_KEY:internal-secret-change-in-prod}
  trial-days: ${SUBSCRIPTION_TRIAL_DAYS:7}
  free-ai-chat-limit: ${SUBSCRIPTION_FREE_AI_CHAT_LIMIT:3}
  free-journal-limit: ${SUBSCRIPTION_FREE_JOURNAL_LIMIT:5}
  entitlement-cache-ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tranquilai: DEBUG
