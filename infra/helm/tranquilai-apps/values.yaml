global:
  imageRegistry: ghcr.io/zacle
  imagePrefix: tranquilai-
  imageTag: latest
  springProfile: prod
  secretName: tranquilai-app-secrets
  domain: api.tranquilai.cloud
  clusterIssuer: letsencrypt-prod
  imagePullSecrets:
    - name: ghcr-pull-secret

x-prod-standard-resources: &prodStandardResources
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 768Mi

x-prod-heavy-resources: &prodHeavyResources
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1500m
    memory: 1024Mi

x-prod-critical-autoscaling: &prodCriticalAutoscaling
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

x-prod-single-replica-autoscaling: &prodSingleReplicaAutoscaling
  enabled: false

api-gateway:
  nameOverride: api-gateway
  replicaCount: 2
  resources: *prodStandardResources
  serviceMonitor:
    enabled: false
  autoscaling: *prodCriticalAutoscaling
  image:
    repository: ghcr.io/zacle/tranquilai-api-gateway
    tag: latest
  config:
    data:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
      AUTH_SERVICE_URL: http://tranquilai-auth-service:80
      USER_SERVICE_URL: http://tranquilai-user-service:80
      AI_SERVICE_URL: http://tranquilai-ai-service:80
      CONTENT_SERVICE_URL: http://tranquilai-content-service:80
      ACTIVITY_SERVICE_URL: http://tranquilai-activity-service:80
      PLAN_SERVICE_URL: http://tranquilai-plan-service:80
      PROGRESS_SERVICE_URL: http://tranquilai-progress-service:80
      NOTIFICATION_SERVICE_URL: http://tranquilai-notification-service:80
      SUBSCRIPTION_SERVICE_URL: http://tranquilai-subscription-service:80
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: 10m
    hosts:
      - host: api.tranquilai.cloud
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-tranquilai-cloud-tls
        hosts:
          - api.tranquilai.cloud

auth-service:
  nameOverride: auth-service
  replicaCount: 2
  resources: *prodStandardResources
  serviceMonitor:
    enabled: false
  autoscaling: *prodCriticalAutoscaling
  image:
    repository: ghcr.io/zacle/tranquilai-auth-service
    tag: latest
  env:
    - name: SPRING_DATASOURCE_URL
      valueFrom:
        secretKeyRef:
          name: tranquilai-app-secrets
          key: AUTH_SERVICE_DATASOURCE_URL
  config:
    data:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
      USER_SERVICE_URL: http://tranquilai-user-service:80
      SPRING_MAIL_HOST: smtp.resend.com
      SPRING_MAIL_PORT: "2587"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "false"
      SPRING_MAIL_CONNECTION_TIMEOUT: "5000"
      SPRING_MAIL_TIMEOUT: "10000"
      SPRING_MAIL_WRITE_TIMEOUT: "5000"
      GOOGLE_WEB_CLIENT_ID: 1069815673695-a1j6l6ku2k598h78j9fte0a6jb1lemp2.apps.googleusercontent.com

user-service:
  nameOverride: user-service
  replicaCount: 2
  resources: *prodStandardResources
  serviceMonitor:
    enabled: false
  autoscaling: *prodCriticalAutoscaling
  image:
    repository: ghcr.io/zacle/tranquilai-user-service
    tag: latest
  env:
    - name: SPRING_DATASOURCE_URL
      valueFrom:
        secretKeyRef:
          name: tranquilai-app-secrets
          key: USER_SERVICE_DATASOURCE_URL
  config:
    data:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      AUTH_SERVICE_URL: http://tranquilai-auth-service:80
      NOTIFICATION_SERVICE_URL: http://tranquilai-notification-service:80

ai-service:
  nameOverride: ai-service
  replicaCount: 1
  resources: *prodHeavyResources
