global:
  springProfile: staging
  domain: api-staging.tranquilai.cloud

x-staging-resources: &stagingResources
  requests:
    cpu: 50m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

x-staging-jpa-resources: &stagingJpaResources
  requests:
    cpu: 75m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi

api-gateway:
  replicaCount: 1
  resources: *stagingResources
  serviceMonitor:
    enabled: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  config:
    data:
      SPRING_PROFILES_ACTIVE: staging
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=45 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      AUTH_SERVICE_URL: http://tranquilai-staging-auth-service:80
      USER_SERVICE_URL: http://tranquilai-staging-user-service:80
      AI_SERVICE_URL: http://tranquilai-staging-ai-service:80
      CONTENT_SERVICE_URL: http://tranquilai-staging-content-service:80
      ACTIVITY_SERVICE_URL: http://tranquilai-staging-activity-service:80
      PLAN_SERVICE_URL: http://tranquilai-staging-plan-service:80
      PROGRESS_SERVICE_URL: http://tranquilai-staging-progress-service:80
      NOTIFICATION_SERVICE_URL: http://tranquilai-staging-notification-service:80
      SUBSCRIPTION_SERVICE_URL: http://tranquilai-staging-subscription-service:80
  ingress:
    annotations:
      cert-manager.io/cluster-issuer:
      nginx.ingress.kubernetes.io/proxy-body-size: 10m
    hosts:
      - host: api-staging.tranquilai.cloud
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: api-staging-origin-tls
        hosts:
          - api-staging.tranquilai.cloud

auth-service:
  replicaCount: 1
  resources: *stagingResources
  serviceMonitor:
    enabled: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  config:
    data:
      SPRING_PROFILES_ACTIVE: staging
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=45 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      USER_SERVICE_URL: http://tranquilai-staging-user-service:80
      SPRING_MAIL_HOST: smtp.resend.com
      SPRING_MAIL_PORT: "2587"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "false"
      SPRING_MAIL_CONNECTION_TIMEOUT: "5000"
      SPRING_MAIL_TIMEOUT: "10000"
      SPRING_MAIL_WRITE_TIMEOUT: "5000"
      EMAIL_REPLY_TO: support@tranquilai.cloud
      GOOGLE_WEB_CLIENT_ID: 221107873546-6jk748el1io9lmvu4hd25shm1igvq5nh.apps.googleusercontent.com

user-service:
  replicaCount: 1
  resources: *stagingResources
  serviceMonitor:
    enabled: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  env:
    - name: SPRING_DATASOURCE_URL
      valueFrom:
        secretKeyRef:
          name: tranquilai-app-secrets
          key: USER_SERVICE_DATASOURCE_URL
    - name: FIREBASE_SERVICE_ACCOUNT_JSON
      valueFrom:
        secretKeyRef:
          name: tranquilai-app-secrets
          key: FIREBASE_SERVICE_ACCOUNT_JSON
          optional: true
    - name: FIREBASE_STORAGE_BUCKET
      valueFrom:
        secretKeyRef:
          name: tranquilai-app-secrets
          key: FIREBASE_STORAGE_BUCKET
          optional: true
  config:
    data:
      SPRING_PROFILES_ACTIVE: staging
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=45 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      AUTH_SERVICE_URL: http://tranquilai-staging-auth-service:80
      NOTIFICATION_SERVICE_URL: http://tranquilai-staging-notification-service:80

ai-service:
  replicaCount: 1
  resources: *stagingResources
  serviceMonitor:
    enabled: false
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  config:
    data:
      SPRING_PROFILES_ACTIVE: staging
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=45 -XX:InitialRAMPercentage=10 -XX:+UseContainerSupport"
      SPRING_DATA_MONGODB_DATABASE: tranquilai_ai_staging
      USER_SERVICE_URL: http://tranquilai-staging-user-service:80
      PLAN_SERVICE_URL: http://tranquilai-staging-plan-service:80
      PROGRESS_SERVICE_URL: http://tranquilai-staging-progress-service:80
      SUBSCRIPTION_SERVICE_URL: http://tranquilai-staging-subscription-service:80

