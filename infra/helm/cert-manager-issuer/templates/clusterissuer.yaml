apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.issuerName }}
spec:
  acme:
    email: {{ .Values.email | quote }}
    server: {{ .Values.server | quote }}
    privateKeySecretRef:
      name: {{ .Values.privateKeySecretName }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.cloudflareSecretName }}
              key: {{ .Values.cloudflareSecretKey }}
