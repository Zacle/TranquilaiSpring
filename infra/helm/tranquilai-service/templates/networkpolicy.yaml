{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tranquilai-service.fullname" . }}
  labels:
    {{- include "tranquilai-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tranquilai-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
    {{- end }}
    {{- range .Values.networkPolicy.allowIngressFromNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .name }}
      ports:
        - protocol: TCP
          port: {{ $.Values.containerPort }}
    {{- end }}
  egress:
    - {}
{{- end }}
