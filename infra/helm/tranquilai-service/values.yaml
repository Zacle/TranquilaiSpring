nameOverride: ""
fullnameOverride: ""

replicaCount: 2

image:
  repository: ghcr.io/zacle/tranquilai-replace-me
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

env: []

envFrom:
  configMaps: []
  secrets:
    - tranquilai-app-secrets

config:
  enabled: true
  data:
    SPRING_PROFILES_ACTIVE: prod
    SERVER_PORT: "8080"
    MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,prometheus
    MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
    SERVER_SHUTDOWN: graceful

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 45
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus

networkPolicy:
  enabled: true
  allowIngressFromNamespaces:
    - name: ingress-nginx
    - name: monitoring
  allowSameNamespace: true

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
