server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tranquilai_auth}
    username: ${SPRING_DATASOURCE_USERNAME:tranquilai}
    password: ${SPRING_DATASOURCE_PASSWORD:tranquilai_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:tranquilai_secret}
      ssl:
        enabled: ${SPRING_REDIS_SSL_ENABLED:${SPRING_DATA_REDIS_SSL_ENABLED:false}}
      timeout: 2000ms

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:noreply@tranquilai.cloud}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}}
          connectiontimeout: ${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${SPRING_MAIL_TIMEOUT:10000}
          writetimeout: ${SPRING_MAIL_WRITE_TIMEOUT:5000}
          ssl:
            enable: ${SPRING_MAIL_SMTP_SSL_ENABLE:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:false}}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}

  thymeleaf:
    cache: false
    prefix: classpath:/templates/

jwt:
  secret: ${JWT_SECRET:change-me-in-production-must-be-256-bits-long!!}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}       # 15 minutes
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8082}
  internal-service-key: ${INTERNAL_SERVICE_KEY:internal-secret-change-in-prod}
  google:
    web-client-id: ${GOOGLE_WEB_CLIENT_ID}
  email:
    from: ${EMAIL_FROM:noreply@tranquilai.cloud}
    from-name: TranquilAI
  verification:
    code-expiry-minutes: 15
    code-length: 6
  events:
    auth-exchange: ${AUTH_EVENTS_EXCHANGE:tranquilai.auth.events}
    verification-email-queue: ${AUTH_VERIFICATION_EMAIL_QUEUE:auth.verification-email}
    verification-email-routing-key: ${AUTH_VERIFICATION_EMAIL_ROUTING_KEY:auth.verification-email.requested}
    user-verified-queue: ${USER_VERIFIED_QUEUE:user.auth-user-verified}
    user-verified-routing-key: ${AUTH_USER_VERIFIED_ROUTING_KEY:auth.user.verified}
  outbox:
    publish-delay-ms: ${OUTBOX_PUBLISH_DELAY_MS:5000}
    batch-size: ${OUTBOX_BATCH_SIZE:25}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.tranquilai: DEBUG
    org.springframework.security: INFO
